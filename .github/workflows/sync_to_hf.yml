name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Force push backend folder to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Isolate the backend folder into its own commit and force push it
          COMMIT=$(git subtree split --prefix backend HEAD)
          git push --force https://Shrizz999:$HF_TOKEN@huggingface.co/spaces/Shrizz999/shrizzfolio $COMMIT:main